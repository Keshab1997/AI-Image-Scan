<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AI দ্বারা MCQ প্রশ্ন স্ক্যান করুন এবং বাংলায় বিস্তারিত ব্যাখ্যা পান">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AI প্রশ্ন স্ক্যানার">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AI প্রশ্ন স্ক্যানার</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0A0E21 0%, #1A1A3E 50%, #0D1117 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      gap: 20px;
    }
    .loader-ring {
      width: 70px; height: 70px;
      border: 4px solid rgba(108,99,255,0.15);
      border-top: 4px solid #6C63FF;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      box-shadow: 0 0 30px rgba(108,99,255,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 18px; color: rgba(255,255,255,0.85);
      letter-spacing: 0.5px;
    }
    .loading-sub {
      font-size: 13px; color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-ring"></div>
    <div class="loading-text">AI প্রশ্ন স্ক্যানার</div>
    <div class="loading-sub">লোড হচ্ছে...</div>
  </div>
  
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
