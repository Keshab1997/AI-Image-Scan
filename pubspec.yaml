name: ai_image_scan
description: AI-powered MCQ Scanner - ছবি থেকে প্রশ্ন বের করে বাংলায় ব্যাখ্যা করে
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Google Gemini AI (compatible with Dart 3.0.x)
  google_generative_ai: ^0.3.0
  
  # Image picking
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  
  # Animations
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  
  # Fonts
  google_fonts: ^5.1.0
  
  # Utils
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  http: ^1.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: false
  web:
    generate: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0E21"
  adaptive_icon_foreground: "assets/images/app_icon.png"

  assets:
    - assets/images/
    - assets/animations/
